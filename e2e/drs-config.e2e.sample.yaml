DrsLogLevel: info
DrsListenPort: 8080

IrodsHost: localhost
IrodsPort: 1247
IrodsZone: tempZone
IrodsAdminUser: rods
IrodsAdminPassword: rods
IrodsPrimaryTestUser: test1
IrodsPrimaryTestPassword: test1
IrodsSecondaryTestUser: test2
IrodsSecondaryTestPassword: test2
IrodsAuthScheme: native
IrodsNegotiationPolicy: request_server_negotiation
IrodsDefaultResource: demoResc
ResourceAffinity:
  - Host: http://127.0.0.1:8080
    Resources: []

OidcUrl: https://localhost:8443
OidcClientId: irods-go-drs
OidcClientSecret: change-me
OidcRealm: drs
OidcScope: openid profile email
OidcInsecureSkipVerify: false

IrodsAccessMethodSupported: false
FileAccessMethodSupported: false
HttpsAccessMethodSupported: true
HttpsAccessImplementation: irods-go-rest
HttpsAccessMethodBaseURL: http://127.0.0.1:8080/api/v1/path/contents?irods_path=
HttpsAccessUseTicket: true

E2E:
  BaseURL: http://127.0.0.1:8080
  SkipTLSVerify: false
  BearerToken: ""
