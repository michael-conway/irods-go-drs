DrsLogLevel: info
DrsListenPort: 8888
PublicURL: http://localhost:8888
HTTPReadTimeoutSeconds: 30
HTTPReadHeaderTimeoutSeconds: 30
HTTPWriteTimeoutSeconds: 60
HTTPIdleTimeoutSeconds: 120

IrodsHost: localhost
IrodsPort: 1247
IrodsZone: tempZone
IrodsAdminUser: rods
IrodsAdminPassword: rods
IrodsPrimaryTestUser: test1
IrodsPrimaryTestPassword: test
IrodsSecondaryTestUser: test2
IrodsSecondaryTestPassword: test
IrodsAuthScheme: native
IrodsAdminLoginType: native
# Local E2E/dev profile. Production deployments should use CS_NEG_REQUIRE.
IrodsNegotiationPolicy: CS_NEG_DONT_CARE
IrodsDefaultResource: providerResc

# Host-facing OIDC issuer URL for host-run DRS/E2E against irods-grid-stack.
# This corresponds to the Keycloak host port and grid-stack OIDC_WEB_URL value.
OidcUrl: https://localhost:8443
OidcClientId: irods-go-drs
OidcClientSecret: change-me
OidcRealm: drs
OidcScope: openid profile email
# Local E2E/dev profile for self-signed Keycloak TLS. Production should be false.
OidcInsecureSkipVerify: true

DefaultTicketLifetimeMinutes: 720
DefaultTicketUseLimit: 50

IrodsAccessMethodSupported: true
FileAccessMethodSupported: false

HttpsAccessMethodSupported: true
HttpsAccessUseTicket: true
HttpsAccessImplementation: irods-go-rest
HttpsAccessMethodBaseURL: http://localhost:8080/api/v1/path/contents?irods_path=
HttpsResourceAffinity:
  - Host: http://localhost:8080
    Resources:
      - providerResc
  - Host: http://localhost:8082
    Resources:
      - resourceResc

S3AccessMethodSupported: true
S3AccessMethodBaseURL: s3://
S3ResourceAffinity:
  - Host: http://localhost:9001
    Resources:
      - providerResc
  - Host: http://localhost:9002
    Resources:
      - resourceResc
