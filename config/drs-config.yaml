DrsIdAvuValue: drs-id
DrsAvuUnit: irods:drs
DrsLogLevel: info
DrsListenPort: 8888
# Public origin used for response URL generation (`self_uri`, compound extension `access_url`).
# Must be an http/https origin with no path, query, or fragment.
PublicURL: http://localhost:8888
HTTPReadTimeoutSeconds: 30
HTTPReadHeaderTimeoutSeconds: 30
HTTPWriteTimeoutSeconds: 60
HTTPIdleTimeoutSeconds: 120
ServiceInfoSampleIntervalMinutes: 420
ServiceInfoFilePath: service-info.json
IRODSAccessHost: localhost
IRODSAccessPort: 1247
IrodsHost: localhost
IrodsPort: 1247
IrodsZone: tempZone
IrodsAdminUser: rods
IrodsAdminPasswordFile: ./resources/irods-admin-password.txt
IrodsAdminLoginType: native
IrodsAuthScheme: native
# Production default: require iRODS SSL negotiation.
# Local-only override: CS_NEG_DONT_CARE
IrodsNegotiationPolicy: CS_NEG_DONT_CARE
IrodsSSLConfig:
  CACertificateFile:
  CACertificatePath:
  EncryptionKeySize: 32
  EncryptionAlgorithm: AES-256-CBC
  EncryptionSaltSize: 8
  EncryptionNumHashRounds: 16
  VerifyServer: hostname
  DHParamsFile:
  ServerName:
IrodsDefaultResource:
# Container-to-container OIDC issuer URL (matches irods-grid-stack OIDC_INTERNAL_URL).
# For host-run DRS against grid-stack, override to https://localhost:8443.
OidcUrl: https://keycloak:8443
OidcClientId: drs-api
OidcClientSecretFile: ./resources/oidc-client-secret-drs.txt
OidcRealm: drs
OidcScope: openid profile email
# Production default: verify Keycloak TLS certificates.
# Local-only override for self-signed certs: true
OidcInsecureSkipVerify: false

DefaultTicketLifetimeMinutes: 720
DefaultTicketUseLimit: 50

IrodsAccessMethodSupported: true
FileAccessMethodSupported: false

HttpsAccessMethodSupported: true
HttpsAccessUseTicket: true
HttpsAccessImplementation: irods-go-rest
HttpsAccessMethodBaseURL: /api/v1/path/contents?irods_path=
HttpsResourceAffinity:
  - Host: http://localhost:8080
    Resources:
  - Host: http://localhost:8081
    Resources:
      - test2-resc

S3AccessMethodSupported: true
S3AccessMethodBaseURL: s3://
S3ResourceAffinity:
  - Host:
    Resources:
