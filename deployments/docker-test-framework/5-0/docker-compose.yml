services:
  postgres:
    image: postgres:15
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: irods
      POSTGRES_PASSWORD: irods
      POSTGRES_DB: ICAT
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U irods -d ICAT"]
      interval: 5s
      retries: 10

  irods-provider:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.provider
    image: irods-provider:5.0.3-ubuntu-noble
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IRODS_ZONE: tempZone
      IRODS_ADMIN_USER: rods
      IRODS_ADMIN_PASSWORD: rods
      IRODS_DB_HOST: postgres
      IRODS_DB_PORT: 5432
      IRODS_DB_NAME: ICAT
      IRODS_DB_USER: irods
      IRODS_DB_PASSWORD: irods
      IRODS_VAULT_DIR: /var/lib/irods/iRODS/Vault
    volumes:
      - irods_data:/var/lib/irods
      - irods_etc:/etc/irods
    ports:
      - "1247:1247"
      - "1248:1248"
      - "20000-20199:20000-20199"  # TCP range for data connections
    cap_add:
      - SYS_ADMIN

  # lightweight icommands client container for testing
  icommands:
    image: ubuntu:24.04
    platform: linux/amd64
    depends_on:
      - irods-provider
    entrypoint: ["/bin/bash", "-c"]
    command: |
      apt-get update && \
      apt-get install -y wget gnupg lsb-release ca-certificates && \
      wget -qO - https://packages.irods.org/irods-signing-key.asc | apt-key add - && \
      echo "deb [arch=amd64] https://packages.irods.org/apt/ $(lsb_release -sc) main" > /etc/apt/sources.list.d/renci-irods.list && \
      apt-get update && apt-get install -y irods-icommands && \
      echo "You can now run iCommands from this container. Example: ils" && bash

volumes:
  pgdata:
  irods_data:
  irods_etc:
