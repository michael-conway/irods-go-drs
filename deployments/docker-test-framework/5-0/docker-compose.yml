services:
  postgres:
    image: postgres:15
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: irods
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10

  irods-provider:
    hostname: irods-provider
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.provider
    image: irods-provider:5.0.3-ubuntu-noble
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      IRODS_ZONE: tempZone
      IRODS_ADMIN_USER: rods
      IRODS_ADMIN_PASSWORD: rods
      IRODS_DB_HOST: postgres
      IRODS_DB_PORT: 5432
      IRODS_DB_NAME: ICAT
      IRODS_DB_USER: irods
      IRODS_DB_PASSWORD: testpassword
      IRODS_VAULT_DIR: /var/lib/irods/iRODS/Vault
    volumes:
      - irods_data:/var/lib/irods
      - irods_etc:/etc/irods
    ports:
      - "1247:1247"
      - "1248:1248"
      - "20000-20199:20000-20199"  # TCP range for data connections
    cap_add:
      - SYS_ADMIN

  irods-s3-api:
    hostname: irods-s3-api
    platform: linux/amd64
    image: ${IRODS_S3_API_IMAGE:-irods/irods_s3_api:latest}
    depends_on:
      irods-provider:
        condition: service_started
    volumes:
      - ./irods-s3-api-entrypoint.sh:/irods-s3-api-entrypoint.sh:ro
      - ./irods-s3-api-config.template.json:/config-template.json:ro
      - ./irods-s3-bucket-mapping.json:/bucket-mapping.json:ro
      - ./irods-s3-user-mapping.json:/user-mapping.json:ro
    ports:
      - "9001:9000"
    entrypoint: ["/bin/sh", "/irods-s3-api-entrypoint.sh"]

  keycloak:
    hostname: keycloak
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile-keycloak
    env_file:
      - ${KEYCLOAK_ENV_FILE:-./keycloak.env}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8443:8443"
      - "9000:9000"
    cap_add:
      - SYS_ADMIN

volumes:
  pgdata:
  irods_data:
  irods_etc:
